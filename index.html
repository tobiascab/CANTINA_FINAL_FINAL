        .watermark {

            }

                color: black !important;
                width: 100%;
                margin: 0 !important;
                padding: 0 !important;
            }

                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            /* Ocultar cabeceras y pies de página del navegador si es posible */
            header, footer {

            }
